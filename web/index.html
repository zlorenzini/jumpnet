<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JumpNet — AI Learning Platform</title>
  <link rel="stylesheet" href="/app/style.css">
</head>
<body>

  <!-- ── Sidebar ──────────────────────────────────────────────────────────── -->
  <nav id="sidebar">
    <div id="sidebar-header">
      <div id="logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">JumpNet</span>
      </div>
      <div id="status-dot" title="Server status"></div>
    </div>

    <ul id="nav-list">
      <li class="nav-group-label">Learn</li>
      <li><a href="#" data-page="home"       class="nav-link active">🏠 Home</a></li>
      <li><a href="#" data-page="lessons"    class="nav-link">📚 Lessons</a></li>
      <li><a href="#" data-page="examples"   class="nav-link">💡 Examples</a></li>
      <li><a href="#" data-page="demos"      class="nav-link">🎬 Demos</a></li>
      <li><a href="#" data-page="challenges" class="nav-link">🏆 Challenges</a></li>
      <li class="nav-group-label">Tools</li>
      <li><a href="#" data-page="classify"   class="nav-link">🔍 Classify</a></li>
      <li><a href="#" data-page="dataset"    class="nav-link">🗂️ Dataset</a></li>
      <li><a href="#" data-page="train"      class="nav-link">🧠 Train</a></li>
      <li><a href="#" data-page="status"     class="nav-link">📡 Status</a></li>
    </ul>

    <div id="sidebar-footer">
      <span id="version-tag">JumpNet v0.1</span>
    </div>
  </nav>

  <!-- ── Mobile top bar ───────────────────────────────────────────────────── -->
  <header id="topbar">
    <button id="menu-toggle" aria-label="Toggle menu">☰</button>
    <span id="topbar-title">JumpNet</span>
  </header>

  <!-- ── Main content ─────────────────────────────────────────────────────── -->
  <main id="main">
    <div id="page-container">
      <!-- Pages are injected here by app.js -->
    </div>
  </main>

  <!-- ── Toast notifications ──────────────────────────────────────────────── -->
  <div id="toast-container"></div>

  <script src="/app/app.js" type="module"></script>
</body>
</html>
